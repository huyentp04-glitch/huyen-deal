<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tạo link Shopee có mã</title>
</head>
<body style="text-align:center;font-family:sans-serif">

<h2>Tạo link Shopee có mã giảm giá</h2>

<input id="link" placeholder="Dán link Shopee vào đây" style="width:80%;padding:12px">
<br><br>

<button onclick="go()" style="padding:12px 20px;background:black;color:white;border:none">
Tạo link mua có mã
</button>

<p id="kq"></p>

<script>
var aff="https://shopee.vn/%C3%81o-Ch%E1%BB%91ng-N%E1%BA%AFng-Tr%E1%BA%BB-Em-Obebi-UPF-50-Ch%E1%BB%91ng-Tia-UV-L%C3%A0m-M%C3%A1t-T%E1%BB%A9c-Th%C3%AC-Cho-B%C3%A9-Trai-B%C3%A9-G%C3%A1i-T%E1%BB%AB-8-23kg-AK216-i.241368901.29633316973?extraParams=%7B%22display_model_id%22%3A198421664586%2C%22model_selection_logic%22%3A3%7D";

function createLink(){
  var input=document.getElementById("link").value.trim();
  if(!input.includes("shopee.vn")){
    alert("Vui lòng dán link Shopee hợp lệ");
    return;
  }

  var productPath=input.split("shopee.vn")[1];

  // Bước trung gian để Shopee hiểu là truy cập từ ngoài
  var middle="https://shopee.vn/?redirect="+encodeURIComponent(productPath);

  var finalLink=aff+"&redirect="+encodeURIComponent(middle);

  document.getElementById("result").innerHTML=
    `<a href="${finalLink}" target="_blank">
      👉 Bấm vào đây để mua và nhận đủ mã giảm giá
     </a>`;
}
</script>

</body>
</html>
